<body data-page="artists">

  <main id="main">
    <section class="wrap page-hero">
      <span class="eyebrow reveal">The Artists</span>
      <h1 class="reveal" data-delay="1">Follow free.<br>Support what <span class="italic gold">lasts.</span></h1>
      <p class="lede reveal" data-delay="2">Every artist here posts their finished work publicly. Supporters get the studio: files, process, votes, and the artist’s time.</p>
      <input class="search-input reveal" data-delay="3" id="artistSearch" type="search"
             placeholder="Search by name or style…" aria-label="Search artists">
    </section>

    <section class="wrap" style="padding-bottom:clamp(64px,9vw,120px)">
      <div class="artist-grid" id="artistGrid"></div>
      <div class="empty-state" id="artistEmpty" hidden>
        <div class="big">No one by that name.</div>
        <p>Try a style — “sci-fi”, “gold”, “soft light” — or browse everyone above.</p>
      </div>
    </section>
  </main>
