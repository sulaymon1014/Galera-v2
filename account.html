<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Account — Galera</title>
  <meta name="description" content="Your Galera membership: profile, favourites, security and preferences.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230e0d12'/%3E%3Ctext x='32' y='44' font-family='Georgia' font-size='36' fill='%23b491e6' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="account">

  <main id="main">
    <section class="wrap page-hero">
      <span class="eyebrow reveal">My Account</span>
      <h1 class="reveal" data-delay="1" id="accTitle">Hello.</h1>
      <p class="lede reveal" data-delay="2" id="accSub"></p>
    </section>

    <section class="wrap" style="padding-bottom:clamp(64px,9vw,120px); display:grid; gap:clamp(36px,5vw,60px)">
      <div class="dash-grid" id="dashGrid"></div>

      <div>
        <div class="section-head reveal">
          <div class="stack">
            <span class="eyebrow">My favourites</span>
            <h2 id="favHeading">Works you’ve saved</h2>
          </div>
          <a class="link-arrow" href="gallery.html">Browse the collection</a>
        </div>
        <div class="masonry" id="favGrid"></div>
        <div class="empty-state" id="favEmpty" hidden>
          <div class="big">Nothing saved yet.</div>
          <p>Tap the ♡ on any work in the collection and it will wait for you here.</p>
          <a class="btn" href="gallery.html">Find your first favourite</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/account.js"></script>
</body>
</html>
