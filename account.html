<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Account — Galera</title>
  <meta name="description" content="Your Galera membership: profile, favourites, security and preferences.">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="assets/icon-180.png">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="manifest" href="assets/manifest.webmanifest">
  <meta name="theme-color" content="#0e0d12">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">

  <link rel="canonical" href="https://artgalera.netlify.app/account.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Galera">
  <meta property="og:title" content="My Account — Galera">
  <meta property="og:description" content="Your Galera membership: profile, favourites, security and preferences.">
  <meta property="og:url" content="https://artgalera.netlify.app/account.html">
  <meta property="og:image" content="https://artgalera.netlify.app/assets/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="My Account — Galera">
  <meta name="twitter:description" content="Your Galera membership: profile, favourites, security and preferences.">
  <meta name="twitter:image" content="https://artgalera.netlify.app/assets/og-image.png">
</head>
<body data-page="account">

  <main id="main">
    <section class="wrap page-hero">
      <span class="eyebrow reveal">My Account</span>
      <h1 class="reveal" data-delay="1" id="accTitle">Hello.</h1>
      <p class="lede reveal" data-delay="2" id="accSub"></p>
    </section>

    <section class="wrap" style="padding-bottom:clamp(64px,9vw,120px); display:grid; gap:clamp(36px,5vw,60px)">
      <div class="dash-grid" id="dashGrid"></div>

      <div>
        <div class="section-head reveal">
          <div class="stack">
            <span class="eyebrow">My favourites</span>
            <h2 id="favHeading">Works you’ve saved</h2>
          </div>
          <a class="link-arrow" href="gallery.html">Browse the collection</a>
        </div>
        <div class="masonry" id="favGrid"></div>
        <div class="empty-state" id="favEmpty" hidden>
          <div class="big">Nothing saved yet.</div>
          <p>Tap the ♡ on any work in the collection and it will wait for you here.</p>
          <a class="btn" href="gallery.html">Find your first favourite</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/account.js"></script>
</body>
</html>
